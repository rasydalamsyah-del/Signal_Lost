<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Signal Lost</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Ambient backdrop behind the phone (only visible on desktop preview) -->
  <div class="backdrop"></div>

  <!-- ===== PHONE FRAME (bezel + hardware buttons, cosmetic on desktop only) ===== -->
  <div class="phone-frame" id="phone-frame">
    <span class="side-btn side-btn-power" aria-hidden="true"></span>
    <span class="side-btn side-btn-vol-up" aria-hidden="true"></span>
    <span class="side-btn side-btn-vol-down" aria-hidden="true"></span>
    <span class="side-btn side-btn-silent" aria-hidden="true"></span>

    <!-- ===== SCREEN ===== -->
    <div id="phone" class="phone">

      <!-- CRT / signal-noise overlay, purely cosmetic, sits above everything -->
      <div class="scanlines" aria-hidden="true"></div>
      <div class="glitch-flash" id="glitch-flash" aria-hidden="true"></div>

      <!-- Dynamic island: overlaps the status bar row, hidden on chromeless screens -->
      <div id="dynamic-island" class="dynamic-island hidden" aria-hidden="true"></div>

      <!-- Global notification banner: fires from Notify.show(), independent of router -->
      <div id="toast-banner" class="toast-banner hidden" aria-hidden="true">
        <span class="toast-icon" id="toast-icon"></span>
        <div class="toast-body">
          <div class="toast-title" id="toast-title"></div>
          <div class="toast-sub" id="toast-sub"></div>
        </div>
        <span class="toast-chevron" id="toast-chevron"></span>
      </div>

      <!-- Status bar: clock, network, wifi, battery. Hidden on Start/Boot/Lock. -->
      <div id="status-bar" class="status-bar hidden">
        <span id="status-clock" class="status-clock">00:00</span>
        <div class="status-icons">
          <span id="status-network" class="status-icon-slot" title="Sinyal"></span>
          <span id="status-wifi" class="status-icon-slot" title="Wi-Fi"></span>
          <span id="status-battery" class="status-battery" title="Baterai">
            <span id="status-battery-fill" class="status-battery-fill"></span>
          </span>
        </div>
      </div>

      <!-- All screen/app content is injected here by the router -->
      <main id="screen-root" class="screen-root"></main>

      <!-- Bottom navigation: Back / Home / Recent. Hidden on Start/Boot/Lock. -->
      <nav id="nav-bar" class="nav-bar hidden">
        <button id="nav-back" class="nav-btn" aria-label="Kembali">
          <span class="nav-btn-ripple"></span>
          <span class="nav-btn-icon"></span>
        </button>
        <button id="nav-home" class="nav-btn nav-btn-home" aria-label="Beranda">
          <span class="nav-btn-ripple"></span>
          <span class="nav-btn-icon"></span>
        </button>
        <button id="nav-recent" class="nav-btn" aria-label="Aplikasi terbaru">
          <span class="nav-btn-ripple"></span>
          <span class="nav-btn-icon"></span>
        </button>
      </nav>

    </div>
    <!-- ===== END SCREEN ===== -->
  </div>
  <!-- ===== END PHONE FRAME ===== -->

  <!-- Load order matters: icons/state/router first, then screens, then apps, then main -->
  <script src="assets/icons.js"></script>
  <script src="core/state.js"></script>
  <script src="core/notify.js"></script>
  <script src="core/story.js"></script>
  <script src="core/router.js"></script>

  <script src="screens/navBar.js"></script>
  <script src="screens/statusBar.js"></script>
  <script src="screens/startScreen.js"></script>
  <script src="screens/bootAnimation.js"></script>
  <script src="screens/lockScreen.js"></script>
  <script src="screens/homeScreen.js"></script>
  <script src="screens/recentApps.js"></script>

  <script src="apps/dashchat.js"></script>
  <script src="apps/contacts.js"></script>
  <script src="apps/snaply.js"></script>
  <script src="apps/stremly.js"></script>
  <script src="apps/gallery.js"></script>
  <script src="apps/storage.js"></script>
  <script src="apps/myshop.js"></script>
  <script src="apps/location.js"></script>
  <script src="apps/calendar.js"></script>
  <script src="apps/settings.js"></script>

  <script src="main.js"></script>
</body>
</html>
